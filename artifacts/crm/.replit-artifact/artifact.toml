kind = "web"
previewPath = "/crm-v1/"
title = "MyCRM (archived)"
version = "1.0.0"
id = "artifacts/crm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/crm-v1/" ]
localPort = 22444

[services.development]
run = "pnpm --filter @workspace/crm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crm", "run", "build" ]
publicDir = "artifacts/crm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22444"
BASE_PATH = "/crm-v1/"
